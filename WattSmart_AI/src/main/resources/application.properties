# Application
spring.application.name=WattSmart_AI
server.port=8080

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/wattsmart}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:aku1993}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT — token secret key and expiration time (24h)
jwt.secret=${JWT_SECRET:wattsmart-super-secret-key-2024-must-be-long}
jwt.expiration=86400000

# Flask — ML microservice URL
flask.service.url=${FLASK_SERVICE_URL:http://flask:5000}

# Logging
logging.level.com.example.wattsmart_ai=DEBUG
logging.level.org.springframework.security=DEBUG

# Connection pool
spring.datasource.hikari.maximum-pool-size=20
server.tomcat.threads.max=400